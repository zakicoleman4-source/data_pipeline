# Handset-base PPK config (template).
# Set the surveyed base position via:
#   * `ant2-pos1/2/3` below (LLH), or
#   * CLI flags --base-llh / --base-ecef / --base-from-rinex, or
#   * the GUI "Read from RINEX base.obs" button.
# Includes SNR + snrmax tweaks tuned for L1+L5 smartphone PPK.

pos1-posmode       =kinematic
pos1-frequency     =l1+l2+l5+l6
pos1-soltype       =combined-nophasereset
pos1-elmask        =5
pos1-snrmask_r     =on
pos1-snrmask_b     =on
pos1-snrmask_L1    =24,24,24,24,24,24,24,24,24
pos1-snrmask_L2    =34,34,34,34,34,34,34,34,34
pos1-snrmask_L5    =19,19,19,19,19,19,19,19,19
pos1-snrmask_L6    =20,20,20,20,20,20,20,20,20
pos1-dynamics      =on
pos1-tidecorr      =0
pos1-ionoopt       =brdc
pos1-tropopt       =saas
pos1-sateph        =brdc
pos1-posopt1       =off
pos1-posopt2       =off
pos1-posopt3       =off
pos1-posopt4       =off
pos1-posopt5       =off
pos1-posopt6       =off
pos1-exclsats      =
pos1-navsys        =45
pos2-armode        =continuous
pos2-gloarmode     =fix-and-hold
pos2-bdsarmode     =on
pos2-arfilter      =on
pos2-arthres       =3
pos2-arthresmin    =3
pos2-arthresmax    =3
pos2-arthres1      =1
pos2-arthres2      =0
pos2-arthres3      =1e-09
pos2-arthres4      =1e-05
pos2-varholdamb    =0.1
pos2-gainholdamb   =0.01
pos2-arlockcnt     =5
pos2-minfixsats    =4
pos2-minholdsats   =5
pos2-mindropsats   =10
pos2-arelmask      =15
pos2-arminfix      =10
pos2-armaxiter     =1
pos2-elmaskhold    =15
pos2-aroutcnt      =1
pos2-maxage        =30
pos2-syncsol       =off
pos2-slipthres     =0.1
pos2-dopthres      =9
pos2-rejionno      =5
pos2-rejcode       =12
pos2-niter         =1
pos2-baselen       =0
pos2-basesig       =0
out-solformat      =llh
out-outhead        =on
out-outopt         =on
out-outvel         =on
out-timesys        =gpst
out-timeform       =hms
out-timendec       =3
out-degform        =deg
out-fieldsep       =
out-outsingle      =off
out-maxsolstd      =0
out-height         =ellipsoidal
out-geoid          =internal
out-solstatic      =all
out-nmeaintv1      =0
out-nmeaintv2      =0
out-outstat        =residual
stats-eratio1      =210
stats-eratio2      =300
stats-eratio5      =25
stats-eratio6      =300
stats-errphase     =0.004
stats-errphaseel   =0
stats-errphasebl   =0
stats-errdoppler   =1
stats-snrmax       =50
stats-errsnr       =0.004
stats-errrcv       =0
stats-stdbias      =30
stats-stdiono      =0.03
stats-stdtrop      =0.3
stats-prnaccelh    =0.125
stats-prnaccelv    =0.001
stats-prnbias      =0.001
